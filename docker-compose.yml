services:
  postgres:
    image: postgres:13
    container_name: kanban-postgres
    environment:
      POSTGRES_DB: kanban
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - kanban-net

  backend:
    container_name: kanban-app
    image: aston-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://kanban-postgres:5432/kanban
      SPRING_DATASOURCE_USERNAME: kanban
      SPRING_DATASOURCE_PASSWORD: kanban
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "8081:8080"
    networks:
      - kanban-net

  frontend:
    container_name: aston-frontend
    image: aston-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - kanban-net

  nginx:
    image: nginx:alpine
    container_name: kanban-nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/app.local.crt:/etc/nginx/certs/app.local.crt:ro
      - ./certs/app.local.key:/etc/nginx/certs/app.local.key:ro
    networks:
      - kanban-net

  loki:
    image: grafana/loki:3.0.0
    container_name: kanban-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./logging/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - kanban-net

  promtail:
    image: grafana/promtail:3.0.0
    container_name: kanban-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./logging/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - kanban-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: kanban-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - loki
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - kanban-net

networks:
  kanban-net:
    driver: bridge

volumes:
  loki-data:
  grafana-data:
