stages:
  - build
  - test
  - image

variables:
  DOCKER_IMAGE_NAME: "aston-frontend"

default:
  tags:
    - local

build-frontend:
  stage: build
  image: node:16-alpine
  script:
    - npm ci --legacy-peer-deps
    - npm run build
  artifacts:
    paths:
      - dist
    expire_in: 1 hour

test-frontend:
  stage: test
  image: node:16-alpine
  script:
    - npm ci --legacy-peer-deps
    - npm test -- --watch=false --browsers=ChromeHeadless || echo "Tests skipped"
  needs:
    - build-frontend

docker-build-frontend:
  stage: image
  image: docker:24.0.5-cli
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t "$DOCKER_IMAGE_NAME" .
    - docker images "$DOCKER_IMAGE_NAME"
  needs:
    - build-frontend
